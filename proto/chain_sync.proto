syntax = "proto3";

package cylinder_seal.chain_sync;

option java_multiple_files = true;
option java_package = "iq.cbi.cylinderseal.chainsync";

// Transaction represents a single value transfer between two users
message Transaction {
    // UUIDv7 encoded as 16 bytes
    bytes transaction_id = 1;

    // Ed25519 public key of sender (32 bytes)
    bytes from_public_key = 2;

    // Ed25519 public key of recipient (32 bytes)
    bytes to_public_key = 3;

    // Amount in micro-OWC (integer, 6 decimal places implied)
    // Example: 1000000 = 1 OWC
    int64 amount_owc = 4;

    // Display currency code at time of payment (e.g., "KES", "NGN", "USD")
    string currency_context = 5;

    // OWC/local_currency exchange rate snapshot (for display only)
    // Encoded as a fixed-point decimal string: "0.987654"
    string fx_rate_snapshot = 6;

    // Unix timestamp in microseconds (not milliseconds)
    int64 timestamp_utc = 7;

    // Previous nonce in the RFC 6979 chain (32 bytes) — ensures chaining for replay prevention
    // This is the nonce from the prior transaction by this user
    bytes previous_nonce = 8;

    // Current nonce derived from previous_nonce + hardware IDs (32 bytes)
    // This proves the transaction was signed by a specific device
    bytes current_nonce = 9;

    // Device monotonic clock (nanoseconds since device boot)
    // Critical for detecting clock-skew attacks even without internet
    int64 monotonic_clock_nanos = 10;

    // Device ID that created this transaction (UUIDv7, 16 bytes)
    // Used for daily spend limits and device reputation tracking
    bytes device_id = 11;

    // Payment channel: NFC, BLE, or Online
    PaymentChannel channel = 12;

    // Optional memo/description (max 140 chars)
    string memo = 13;

    // Optional device attestation token (SafetyNet/Play Integrity JWT)
    // Proves this transaction came from an unrooted Android device
    string device_attestation = 14;

    // Transaction location: latitude in decimal degrees (-90 to +90)
    // 0 if not available or offline transaction
    double latitude = 16;

    // Transaction location: longitude in decimal degrees (-180 to +180)
    // 0 if not available or offline transaction
    double longitude = 17;

    // GPS accuracy in meters (0 if not available)
    // Used to detect suspiciously broad location claims
    int32 location_accuracy_meters = 18;

    // Unix timestamp in microseconds when location was captured
    // May differ from timestamp_utc if location is from prior sync
    int64 location_timestamp_utc = 19;

    // Source of location data (GPS, network-based, last-known, or offline)
    LocationSource location_source = 20;

    // Ed25519 signature (64 bytes) over canonical CBOR of above fields
    // (excluding this signature field itself)
    bytes signature = 15;
}

enum LocationSource {
    LOCATION_SOURCE_UNSPECIFIED = 0;
    LOCATION_SOURCE_GPS = 1;           // Real-time GPS (high accuracy)
    LOCATION_SOURCE_NETWORK = 2;       // Network-based (WiFi/cell, lower accuracy)
    LOCATION_SOURCE_LAST_KNOWN = 3;    // Last known location from prior sync
    LOCATION_SOURCE_OFFLINE = 4;       // User provided (when offline, no automated source)
}

enum PaymentChannel {
    CHANNEL_UNSPECIFIED = 0;
    CHANNEL_NFC = 1;
    CHANNEL_BLE = 2;
    CHANNEL_ONLINE = 3;
}

// JournalEntry is one unit in a user's personal append-only transaction journal.
// This is NOT a blockchain — it's a device-local transaction log with super-peer validation.
message JournalEntry {
    // UUIDv7 encoded as 16 bytes
    bytes entry_id = 1;

    // Ed25519 public key of the user who owns this entry (32 bytes)
    bytes user_public_key = 2;

    // Monotonically increasing sequence number for this user's journal
    uint64 sequence_number = 3;

    // BLAKE2b-256 hash of the previous entry (32 bytes)
    // For genesis entry: BLAKE2b-256(user_public_key)
    bytes prev_entry_hash = 4;

    // One or more transactions in this entry
    repeated Transaction transactions = 5;

    // BLAKE2b-256 hash of (prev_entry_hash || sequence_number || canonical CBOR of transactions)
    bytes entry_hash = 6;

    // Ed25519 signature (64 bytes) by entry owner over entry_hash
    bytes signature = 7;

    // Device-local UTC microseconds when entry was created
    int64 created_at = 8;

    // Sync status tracked on device (not sent to super-peer)
    SyncStatus sync_status = 9;

    // Device ID that created this entry
    bytes device_id = 10;

    // Vector clock for causal ordering (maps device_id → logical clock)
    // Keys are UUIDs (16 bytes) of devices in the system
    // Values are logical clock increments for causality tracking
    map<string, uint64> vector_clock = 11;

    // Monotonic clock timestamp (nanoseconds)
    int64 monotonic_created_nanos = 12;

    // Optional user signature for high-value transactions
    bytes user_signature = 13;

    // Super-peer confirmations (3+ of 5 required)
    repeated SuperPeerConfirmation super_peer_confirmations = 14;
}

// Confirmation signature from a super-peer validating a journal entry
message SuperPeerConfirmation {
    string super_peer_id = 1;
    bytes signature = 2;
    int64 confirmed_at = 3;
}

enum SyncStatus {
    SYNC_STATUS_UNSPECIFIED = 0;
    SYNC_STATUS_PENDING = 1;      // not yet submitted to super-peer
    SYNC_STATUS_CONFIRMED = 2;    // super-peer acknowledged
    SYNC_STATUS_CONFLICTED = 3;   // super-peer detected a conflict
}

// Acknowledgement from super-peer for a submitted journal entry
message SyncAck {
    // Echo back the entry_id for correlation
    bytes entry_id = 1;

    // Status of the submission
    SyncAckStatus status = 2;

    // If CONFLICTED, details about the conflict
    string conflict_reason = 3;

    // Updated user balance in micro-OWC (from super-peer view)
    int64 balance_owc = 4;

    // Updated credit score (nullable, may not have enough history)
    string credit_score = 5;

    // Timestamp when super-peer confirmed the entry
    int64 confirmed_at = 6;
}

enum SyncAckStatus {
    ACK_STATUS_UNSPECIFIED = 0;
    ACK_STATUS_CONFIRMED = 1;     // entry accepted, added to journal
    ACK_STATUS_REJECTED = 2;      // malformed or validation failed
    ACK_STATUS_CONFLICTED = 3;    // double-spend or other conflict
    ACK_STATUS_PENDING = 4;       // accepted but awaiting human review
}

// Request for current currency rates
message CurrencyRateRequest {
    // User's primary currency (e.g., "KES")
    string primary_currency = 1;

    // List of secondary currencies the device wants rates for
    repeated string secondary_currencies = 2;
}

// Response with current OWC rates
message CurrencyRateBundle {
    // Map of "OWC/USD" -> rate string, e.g. "0.987654"
    map<string, string> rates = 1;

    // Timestamp when rates were last updated (UTC microseconds)
    int64 fetched_at = 2;

    // When this rate batch expires (advisory)
    int64 expires_at = 3;

    // Rate source identifier (e.g., "interbank" — all rates are real, no markup)
    string rate_source = 4;
}

// Initiate a fiat withdrawal/cash-out
message WithdrawalRequest {
    // Amount in micro-OWC to withdraw
    int64 amount_owc = 1;

    // Target currency (e.g., "KES", "USD")
    string target_currency = 2;

    // Destination method: "mpesa", "bank_transfer", "cash_agent"
    string destination_method = 3;

    // Destination identifier (phone number, bank account, agent ID)
    string destination_identifier = 4;
}

// Response to withdrawal request
message WithdrawalStatus {
    // Unique withdrawal reference
    string withdrawal_id = 1;

    // Current status
    WithdrawalStatusEnum status = 2;

    // When initiated
    int64 created_at = 3;

    // Estimated completion time (UTC microseconds)
    int64 expected_completion_at = 4;

    // If failed, the reason
    string error_message = 5;
}

enum WithdrawalStatusEnum {
    WITHDRAWAL_STATUS_UNSPECIFIED = 0;
    WITHDRAWAL_STATUS_PENDING = 1;
    WITHDRAWAL_STATUS_PROCESSING = 2;
    WITHDRAWAL_STATUS_COMPLETED = 3;
    WITHDRAWAL_STATUS_FAILED = 4;
}

// ============================================================================
// Additional Messages for Iron-Grade Security
// ============================================================================

message KeyRotationCertificate {
    // Proves device rotated its keys
    bytes old_public_key = 1;
    bytes new_public_key = 2;
    int64 rotation_at = 3;
    bytes device_id = 4;
    string device_attestation = 5;
    bytes signature = 6;  // Signed with old key
}

message EncryptedTransaction {
    // E2E encrypted transaction (super-peer can't read it)
    bytes plaintext_hash = 1;      // For dedup
    bytes ciphertext = 2;          // AES-256-GCM encrypted
    bytes nonce = 3;               // IV for encryption
    bytes auth_tag = 4;            // GCM auth tag
}

message WitnessSignature {
    // For large transactions (500+ OWC)
    bytes witness_id = 1;
    bytes witness_signature = 2;
    int64 approved_at = 3;
}

message DeviceReputation {
    // Device behavior score (ML-computed)
    int32 score = 1;  // 0-100
    int32 days_active = 2;
    int32 transaction_count = 3;
    repeated string anomalies = 4;  // ["geographic_jump", "unusual_time"]
}

message AuditLogEntry {
    // Immutable, signed audit log (append-only)
    uint64 sequence = 1;
    int64 timestamp = 2;
    int64 monotonic_nanos = 3;
    string action = 4;  // EntryConfirmed, TransactionDoubleSpend, etc.
    bytes user_id = 5;
    bytes details_json = 6;
    repeated string signed_by = 7;  // ["sp-africa", "sp-asia", "sp-americas"]
    repeated bytes signatures = 8;
    bytes prev_hash = 9;
}

// Service for device ↔ super-peer sync
service ChainSync {
    // Bidirectional streaming: device sends journal entries, super-peer streams back ACKs
    rpc SyncChain(stream JournalEntry) returns (stream SyncAck);

    // Get current currency rates
    rpc GetCurrencyRates(CurrencyRateRequest) returns (CurrencyRateBundle);

    // Initiate a fiat withdrawal
    rpc InitiateWithdrawal(WithdrawalRequest) returns (WithdrawalStatus);

    // NEW: Rotate device keys
    rpc RotateDeviceKey(KeyRotationCertificate) returns (KeyRotationAck);

    // NEW: Recover account (key recovery)
    rpc RequestRecoveryShare(RecoveryRequest) returns (RecoveryShare);

    // NEW: Get device reputation
    rpc GetDeviceReputation(DeviceReputationRequest) returns (DeviceReputation);

    // NEW: Get audit log for user
    rpc GetAuditLog(AuditLogRequest) returns (AuditLogResponse);

    // NEW: Request witness approval for large tx
    rpc RequestWitnessApproval(WitnessRequest) returns (WitnessResponse);

    // NEW: Get Merkle proof for balance verification
    rpc GetMerkleProof(MerkleProofRequest) returns (MerkleProofResponse);

    // NEW: Relay entries from offline peers through online peers (whisper network)
    // Online peer relays pending entries from offline peer to super-peer
    rpc RelayEntries(EntryRelay) returns (RelayAck);
}

message KeyRotationAck {
    bool accepted = 1;
    string reason = 2;
    int64 grace_period_expires_at = 3;
}

message RecoveryRequest {
    bytes user_id = 1;
    bytes proof_of_identity = 2;  // Biometric + SMS OTP
}

message RecoveryShare {
    bytes encrypted_share = 1;
    bytes share_id = 2;
    int64 expires_at = 3;
}

message DeviceReputationRequest {
    bytes device_id = 1;
}

message AuditLogRequest {
    bytes user_id = 1;
    int64 since = 2;  // Since timestamp
}

message AuditLogResponse {
    repeated AuditLogEntry entries = 1;
}

message WitnessRequest {
    bytes transaction_id = 1;
    int64 amount_owc = 2;
    bytes recipient_public_key = 3;
    int64 requested_at = 4;
    int64 expires_at = 5;
    bytes requester_signature = 6;
}

message WitnessResponse {
    bool approved = 1;
    bytes witness_signature = 2;
    bytes witness_id = 3;
}

message MerkleProofRequest {
    bytes user_id = 1;
}

message MerkleProofResponse {
    bytes root_hash = 1;
    repeated MerkleProofNode path = 2;
}

message MerkleProofNode {
    enum Position {
        LEFT = 0;
        RIGHT = 1;
    }
    bytes hash = 1;
    Position position = 2;
}

// ============================================================================
// Whisper Network: Peer-to-Peer Entry Relay
// ============================================================================

// EntryRelay: Online peer relays pending entries from offline peer to super-peer
// This enables offline-first devices to sync without direct internet connection
message EntryRelay {
    // Original device's Ed25519 public key (32 bytes)
    // Identifies which device originated these entries
    bytes originating_device_pk = 1;

    // Original device's current hardware-bound nonce (32 bytes)
    // Used to detect stale/replayed relays
    bytes originating_nonce = 2;

    // Relaying device's Ed25519 public key (32 bytes)
    // The online peer that is relaying these entries
    bytes relay_device_pk = 3;

    // Pending journal entries from offline device (max 100 entries)
    repeated JournalEntry entries = 4;

    // Timestamp when relay device synced (UTC microseconds)
    // Super-peer uses this to detect stale relays
    int64 relay_timestamp = 5;

    // Ed25519 signature (64 bytes) by relay device
    // Signs: BLAKE2b(originating_device_pk || entries_cbor)
    // Proves relay device intentionally forwarded these entries
    bytes relay_signature = 6;

    // Relay device's ID (UUIDv7, 16 bytes)
    bytes relay_device_id = 7;
}

// RelayAck: Super-peer acknowledgement of relayed entries
message RelayAck {
    // Whether relay was accepted
    bool accepted = 1;

    // IDs of entries that were accepted and queued for quorum
    repeated bytes accepted_entry_ids = 2;

    // IDs of entries that were rejected (malformed, conflict, etc)
    repeated bytes rejected_entry_ids = 3;

    // Status for each entry
    RelayStatus status = 4;

    // If rejected, the reason
    string error_message = 5;

    // Relay device's updated reputation score (0-100)
    // Decreases if relay device forwards conflicted entries
    int32 relay_device_reputation = 6;
}

enum RelayStatus {
    RELAY_STATUS_UNSPECIFIED = 0;
    RELAY_STATUS_QUEUED = 1;          // Entries queued for 3-of-5 quorum
    RELAY_STATUS_SIGNATURE_INVALID = 2; // Relay signature verification failed
    RELAY_STATUS_NONCE_STALE = 3;       // Originating nonce is out-of-order
    RELAY_STATUS_RATE_LIMITED = 4;      // Relay device exceeds rate limit
    RELAY_STATUS_DUPLICATE = 5;         // Entries already received
}

// ============================================================================
// Super-peer to super-peer gossip (internal)
// ============================================================================

// Gossip notification of a confirmed entry to other super-peers
message EntryConfirmationGossip {
    // User's public key
    bytes user_public_key = 1;

    // The entry hash
    bytes entry_hash = 2;

    // Sequence number
    uint64 sequence_number = 3;

    // Timestamp when confirmed locally
    int64 confirmed_at = 4;

    // NEW: Ledger state hash AFTER applying this entry
    // BLAKE2b-256 of the full ledger state (deterministic)
    // Enables Byzantine quorum to vote on ledger hash instead of timestamp
    // Prevents clock-skew attacks and makes consensus deterministic
    bytes ledger_hash_after_entry = 5;

    // NEW: Previous ledger hash (before applying this entry)
    // Allows super-peers to verify the state transition is valid
    bytes ledger_hash_before_entry = 6;

    // NEW: Number of super-peers who have confirmed this ledger hash
    // Once >= 3, entry is confirmed (3-of-5 quorum)
    int32 confirmation_count = 7;

    // NEW: List of super-peer IDs who voted for this ledger hash
    repeated string confirming_peer_ids = 8;
}

service SuperPeerGossip {
    // Announce a confirmed entry to peer nodes
    rpc AnnounceEntry(EntryConfirmationGossip) returns (GossipAck);

    // Replicate full journal state (compressed CBOR dump)
    rpc ReplicateJournal(ReplicationRequest) returns (ReplicationResponse);
}

message GossipAck {
    bool acknowledged = 1;
    string message = 2;
}

message ReplicationRequest {
    // Peer identifier
    string peer_id = 1;

    // Last known block hash from this peer
    bytes last_known_hash = 2;
}

message ReplicationResponse {
    // Compressed CBOR dump of journal entries
    bytes journal_dump = 1;

    // Timestamp of dump
    int64 created_at = 2;
}

// ============================================================================
// Business accounts (individual vs business_pos vs business_electronic)
// ============================================================================

enum AccountType {
    ACCOUNT_TYPE_UNSPECIFIED = 0;
    ACCOUNT_TYPE_INDIVIDUAL = 1;
    ACCOUNT_TYPE_BUSINESS_POS = 2;
    ACCOUNT_TYPE_BUSINESS_ELECTRONIC = 3;
}

message BusinessProfile {
    bytes user_id = 1;
    string legal_name = 2;
    string commercial_registration_id = 3;
    string tax_id = 4;
    string industry_code = 5;
    string registered_address = 6;
    string contact_email = 7;
    // 32-byte Ed25519 public keys.
    repeated bytes authorized_signer_public_keys = 8;
    uint32 signature_threshold = 9;
    int64 multisig_threshold_owc = 10;
    int64 daily_volume_limit_owc = 11;
    int64 per_transaction_limit_owc = 12;
    bool edd_cleared = 13;
    int64 approved_at = 14;   // UTC micros; 0 if unapproved
    int64 created_at = 15;
}

message BusinessRegistrationRequest {
    bytes account_public_key = 1;
    AccountType account_type = 2;
    string legal_name = 3;
    string commercial_registration_id = 4;
    string tax_id = 5;
    string industry_code = 6;
    string registered_address = 7;
    string contact_email = 8;
    // Optional at registration time; can be added later.
    repeated bytes authorized_signer_public_keys = 9;
    // Signed attestation by the applying business's primary key.
    bytes signature = 10;
}

message BusinessRegistrationResponse {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        STATUS_PENDING_REVIEW = 1;   // CBI ops team will verify registry + tax-id
        STATUS_APPROVED = 2;
        STATUS_REJECTED = 3;
    }
    Status status = 1;
    bytes user_id = 2;
    string reason = 3;
}

// Invoice issued by a business_electronic account for a customer to pay.
message Invoice {
    bytes invoice_id = 1;            // UUIDv7
    bytes issuer_user_id = 2;        // the business's user_id
    string issuer_legal_name = 3;
    int64 amount_owc = 4;
    string currency = 5;
    string description = 6;
    string external_reference = 7;   // merchant's own order id
    int64 created_at = 8;
    int64 expires_at = 9;
    // Optional webhook URL; super-peer POSTs paid/expired events here.
    string webhook_url = 10;
    // Ed25519 signature by the business over the canonical CBOR of
    // (invoice_id || amount_owc || currency || expires_at).
    bytes signature = 11;
}

message CreateInvoiceRequest {
    Invoice invoice = 1;
}

message CreateInvoiceResponse {
    bytes invoice_id = 1;
    string payment_uri = 2;  // CS1:INV:<hex> — customer scans to pay
    int64 expires_at = 3;
}

// Status poll for an invoice (used when no webhook is configured).
message InvoiceStatusRequest {
    bytes invoice_id = 1;
}

message InvoiceStatusResponse {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        STATUS_OPEN = 1;
        STATUS_PAID = 2;
        STATUS_EXPIRED = 3;
        STATUS_CANCELLED = 4;
    }
    Status status = 1;
    bytes paying_user_id = 2;        // populated when PAID
    bytes paying_transaction_id = 3; // UUIDv7 of the confirming tx
    int64 paid_at = 4;
}

// Business-facing service. Separate from `ChainSync` because:
//  - auth model differs (API key bearer instead of per-device mTLS)
//  - rate limits differ (business accounts get higher burst)
//  - the endpoints aren't appropriate for consumer wallets
service BusinessApi {
    // Register a new business account. Request is pending_review until CBI
    // ops verifies the commercial registration + tax ID against national
    // registries.
    rpc RegisterBusiness(BusinessRegistrationRequest) returns (BusinessRegistrationResponse);

    // Fetch the calling business's profile (auth: API key).
    rpc GetBusinessProfile(GetBusinessProfileRequest) returns (BusinessProfile);

    // Update authorized-signer set or signature threshold.
    rpc UpdateBusinessProfile(BusinessProfile) returns (BusinessProfile);

    // Create a payment invoice (business_electronic only).
    rpc CreateInvoice(CreateInvoiceRequest) returns (CreateInvoiceResponse);

    // Poll invoice status.
    rpc GetInvoiceStatus(InvoiceStatusRequest) returns (InvoiceStatusResponse);
}

message GetBusinessProfileRequest {
    bytes user_id = 1;
}
