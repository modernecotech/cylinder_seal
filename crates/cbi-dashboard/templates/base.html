<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBI Dashboard - Digital Iraqi Dinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar Navigation -->
        <nav class="w-64 bg-blue-900 text-white shadow-lg">
            <div class="p-6 border-b border-blue-800">
                <h1 class="text-2xl font-bold">CBI Dashboard</h1>
                <p class="text-blue-200 text-sm">Digital Iraqi Dinar</p>
            </div>
            <ul class="mt-6 space-y-2 px-4">
                <li><a href="/overview" class="block px-4 py-2 rounded hover:bg-blue-800">📊 Overview</a></li>
                <li><a href="/projects" class="block px-4 py-2 rounded hover:bg-blue-800">🏭 Industrial Projects</a></li>
                <li><a href="/analytics" class="block px-4 py-2 rounded hover:bg-blue-800">📈 Analytics</a></li>
                <li><a href="/compliance" class="block px-4 py-2 rounded hover:bg-blue-800">⚖️ Compliance</a></li>
                <li><a href="/monetary" class="block px-4 py-2 rounded hover:bg-blue-800">💰 Monetary Policy</a></li>
                <li><a href="/accounts" class="block px-4 py-2 rounded hover:bg-blue-800">👥 Accounts</a></li>
                <li><a href="/risk" class="block px-4 py-2 rounded hover:bg-blue-800">⚠️ Risk & AML</a></li>
                <li><a href="/audit" class="block px-4 py-2 rounded hover:bg-blue-800">📋 Audit</a></li>
            </ul>
            <div class="absolute bottom-0 left-0 right-0 w-64 p-4 border-t border-blue-800">
                <button hx-post="/auth/logout" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded">
                    Logout
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white shadow">
                <div class="px-8 py-4">
                    <h2 class="text-3xl font-bold text-gray-900">{% block title %}{% endblock %}</h2>
                </div>
            </header>

            <!-- Content -->
            <main class="p-8">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
