name: cylinder_seal
description: Digital Iraqi Dinar wallet — Flutter front-end (mobile + web).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Rust FFI bridge — the Dart side of the cs-bridge crate.
  flutter_rust_bridge: 2.7.0

  # State + DI
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2

  # Persistence
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5

  # Wire formats
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Networking — gRPC over web/mobile.
  grpc: ^4.0.1
  protobuf: ^3.1.0

  # Misc
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  ffigen: ^13.0.0
  ffi: ^2.1.3

  # Integration tests
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
